<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{ERROR_TYPE} - Nova Error</title>
    <style>
        :root {
            --bg: #ffffff;
            --bg-secondary: #f6f8fa;
            --bg-tertiary: #eaecef;
            --border: #d0d7de;
            --text: #1f2328;
            --text-secondary: #6e7681;
            --accent: #0969da;
            --accent-hover: #218bff;
            --error: #d1242f;
            --warning: #b08800;
            --success: #238636;
            --code-line-highlight: rgba(9, 105, 218, 0.1);
            --code-bg: #f6f8fa;
            --font-mono: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            padding: 24px;
            background-color: var(--bg);
            color: var(--text);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            line-height: 1.6;
        }

        pre{
            margin: 0;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Error Header */
        .error-header {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-left: 4px solid var(--error);
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
        }

        .error-title {
            font-size: 28px;
            font-weight: 600;
            color: var(--error);
            margin: 0 0 12px;
            font-family: var(--font-mono);
        }

        .error-message {
            font-size: 15px;
            color: var(--text);
            word-break: break-all;
            line-height: 1.6;
        }

        .error-meta {
            margin-top: 12px;
            display: flex;
            gap: 24px;
            font-size: 13px;
            color: var(--text-secondary);
        }

        .error-meta > span { display: flex; align-items: center; gap: 8px; }
        .meta-label { color: var(--text-secondary); }
        .meta-value { color: var(--accent); font-weight: 500; }

        /* Stack Trace - Using Details/Summary */
        .stack-trace {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 12px;
            overflow: hidden;
        }

        .stack-header {
            padding: 12px 16px;
            background: var(--bg-tertiary);
            border-bottom: 1px solid var(--border);
            font-size: 13px;
            font-weight: 600;
            color: var(--text-secondary);
        }

        details.trace-entry {
            background: var(--bg-secondary);
            border-bottom: 1px solid var(--border);
        }

        details.trace-entry:last-child { border-bottom: none; }

        details.trace-entry[open] { background: var(--bg-tertiary); }

        .trace-summary {
            padding: 10px 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 12px;
            list-style: none;
        }

        .trace-summary::-webkit-details-marker { display: none; }

        .trace-summary:hover { background: var(--bg-tertiary); }

        .trace-arrow {
            width: 16px;
            height: 16px;
            color: var(--text-secondary);
            transition: transform 0.2s ease;
            flex-shrink: 0;
            display: inline-block;
        }

        details.trace-entry[open] .trace-arrow { transform: rotate(90deg); }

        .trace-file {
            font-family: var(--font-mono);
            font-size: 13px;
            color: var(--accent);
            flex: 1;
            word-break: break-all;
        }

        .trace-line {
            color: var(--text-secondary);
            font-size: 12px;
        }

        .trace-function {
            color: var(--text);
            font-family: var(--font-mono);
            white-space: nowrap;
        }

        .trace-class {
            color: var(--accent-hover);
            font-family: var(--font-mono);
        }

        .trace-type {
            color: var(--text-secondary);
        }

        .trace-args1 { color: #0969da; }
        .trace-args2 { color: #054074; }

        /* Code Block in Details */
        .trace-code {
            padding: 16px;
            background: var(--code-bg);
            overflow-x: auto;
            font-family: var(--font-mono);
            font-size: 13px;
            line-height: 1.6;
        }

        .code-line {
            display: flex;
            min-width: 100%;
        }

        .line-num {
            width: 40px;
            padding-right: 12px;
            text-align: right;
            color: var(--text-secondary);
            user-select: none;
            font-size: 12px;
            flex-shrink: 0;
        }

        .code-content {
            padding: 0 16px;
            white-space: pre;
            flex: 1;
        }

        /* Highlight current/active line */
        .code-line.current .line-num {
            color: var(--accent);
            font-weight: 600;
            background-color: var(--accent);
            color: #fff;
            padding-left: 8px;
            padding-right: 12px;
        }

        .code-line.current {
            background-color: var(--code-line-highlight);
        }

        /* Syntax Highlighting */
        .hl-comment { color: var(--text-secondary); font-style: italic; }
        .hl-string { color: var(--success); }
        .hl-number { color: var(--warning); }
        .hl-keyword { color: var(--accent); font-weight: 600; }
        .hl-function { color: var(--accent); }
        .hl-class { color: var(--accent-hover); }
        .hl-type { color: #238636; }
        .hl-constant { color: var(--warning); }
        .hl-var { color: var(--accent); }

        /* Override highlight_string inline styles for light theme */
        .trace-code span[style*="color: #ff8000"],
        .trace-code span[style*="color:#ff8000"] { color: var(--accent) !important; }
        .trace-code span[style*="color: #800000"],
        .trace-code span[style*="color:#800000"] { color: var(--success) !important; }
        .trace-code span[style*="color: #008000"],
        .trace-code span[style*="color:#008000"] { color: var(--warning) !important; }
        .trace-code span[style*="color: #000080"],
        .trace-code span[style*="color:#000080"] { color: var(--accent) !important; }
        .trace-code span[style*="color: #008080"],
        .trace-code span[style*="color:#008080"] { color: var(--accent) !important; }

        /* Responsive */
        @media (max-width: 768px) {
            body { padding: 16px; }
            .error-title { font-size: 22px; }
            .error-meta { flex-wrap: wrap; gap: 12px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="error-header">
            <h1 class="error-title">{ERROR_TYPE}</h1>
            <div class="error-message">{ERROR_MESSAGE}</div>
            <div class="error-meta">
                <span><span class="meta-label">PHP:</span> <span class="meta-value">{PHP_VERSION}</span></span>
                <span><span class="meta-label">Nova:</span> <span class="meta-value">{NOVA_VERSION}</span></span>
            </div>
        </div>

        <div class="stack-trace">
            <div class="stack-header">Stack Trace</div>
            {TEMPLATE_LIST}
        </div>
    </div>
</body>
</html>
